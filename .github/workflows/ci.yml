name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt-check
      - run: go mod tidy
      - run: git diff --exit-code go.mod go.sum
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out -count=1 ./...
      - run: go build ./cmd/fetchmark
      - run: FM_API_KEYS=test-key docker compose -f deploy/docker-compose.yml config >/tmp/fetchmark-compose.yml
      - run: FM_API_KEYS=test-key FM_SEARXNG_URL=http://example.test docker compose -f deploy/docker-compose.external.yml config >/tmp/fetchmark-compose-external.yml
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
