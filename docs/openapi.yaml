openapi: 3.1.0
info:
  title: Fetchmark API
  version: "0.1.0"
  description: |
    Fetchmark is a self-hostable alternative to Tavily / Exa. It runs
    SearXNG under the hood, fetches the returned URLs in parallel with
    SSRF-safe egress, extracts clean content with Trafilatura, and
    re-ranks results with BM25 + engine-diversity bonus.

    Authentication: every /v1/* endpoint requires either
    `Authorization: Bearer <api_key>` or `X-API-Key: <api_key>`.
    Fields flagged "admin only" require the caller's key to be in
    `FM_ADMIN_API_KEYS`; otherwise the request is rejected with 403.

servers:
  - url: http://localhost:8080
    description: Local dev

security:
  - apiKeyHeader: []
  - apiKeyBearer: []

components:
  securitySchemes:
    apiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
    apiKeyBearer:
      type: http
      scheme: bearer

  schemas:
    SearchRequest:
      type: object
      required: [query]
      properties:
        query:           { type: string, example: "site:go.dev slices" }
        engines:         { type: array, items: { type: string } }
        categories:
          type: array
          items: { type: string }
          description: "SearXNG categories to search, for example general, news, science, or images. Sent as a comma-separated category list upstream."
          example: [general, news]
        language:
          type: string
          description: "SearXNG language code for search results, for example en or auto."
          example: en
        time_range:
          type: string
          enum: [day, week, month, year]
          description: "Optional SearXNG freshness filter."
        render:
          type: boolean
          description: "When true, fetch pages with the configured rendering path for JavaScript-heavy content."
        max_results:     { type: integer, minimum: 1, maximum: 50, default: 10 }
        formats:         { type: array, items: { type: string, enum: [json, markdown, html] } }
        timeout_ms:      { type: integer, minimum: 1, maximum: 60000 }
        respect_robots:
          type: boolean
          description: "Admin only when set to false."
        proxy_url:
          type: string
          description: "Admin only. When set, bypasses cache."

    ParseRequest:
      type: object
      required: [urls]
      properties:
        urls:            { type: array, items: { type: string, format: uri } }
        query:           { type: string, description: "Optional — enables ranking." }
        formats:         { type: array, items: { type: string, enum: [json, markdown, html] } }
        timeout_ms:      { type: integer }
        respect_robots:  { type: boolean, description: "Admin only when false." }
        proxy_url:       { type: string,  description: "Admin only." }

    SearchResult:
      type: object
      properties:
        url:            { type: string, format: uri }
        title:          { type: string }
        snippet:        { type: string }
        engines:        { type: array, items: { type: string } }
        from_cache:     { type: boolean }
        fetch_ms:       { type: integer }
        status:         { type: integer, description: "(Reserved — not currently populated.) HTTP status returned by upstream." }
        score:          { type: number, format: float }
        metadata:
          type: object
          additionalProperties: { type: string }
          description: "Search-provider metadata. Current keys include category (the SearXNG category for the result) and original_rank (the 1-based rank returned by the upstream provider before Fetchmark re-ranking)."
          examples:
            - category: news
              original_rank: "3"
        content:        { $ref: "#/components/schemas/Content" }
        unsupported_reason: { type: string, description: "Reason if parsing could not complete: non_html, js_required, robots_disallowed, egress_blocked, fetch_failed, extract_failed." }

    Content:
      type: object
      properties:
        url:           { type: string, format: uri }
        title:         { type: string }
        author:        { type: string }
        site_name:     { type: string }
        description:   { type: string }
        language:      { type: string }
        published_at:  { type: string, format: date-time }
        main_text:     { type: string }
        markdown:      { type: string }
        cleaned_html:  { type: string }
        unsupported_reason: { type: string }

    ErrorResponse:
      type: object
      properties:
        error:     { type: string }

paths:
  /healthz:
    get:
      summary: Liveness probe.
      security: []
      responses:
        "200": { description: ok }

  /readyz:
    get:
      summary: Readiness — verifies SearXNG and Redis reachability.
      security: []
      responses:
        "200": { description: ok }
        "503": { description: unready }

  /metrics:
    get:
      summary: Prometheus scrape endpoint.
      security: []
      responses:
        "200": { description: Prometheus text exposition format. }

  /v1/search:
    post:
      summary: Full pipeline — search + parallel fetch + extract + rank.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SearchRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  query:   { type: string }
                  count:   { type: integer }
                  results: { type: array, items: { $ref: "#/components/schemas/SearchResult" } }
        "400": { description: bad_request, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        "401": { description: missing_or_invalid_api_key }
        "403": { description: admin_only_flag_used_with_non_admin_key }
        "429": { description: rate_limited }
        "502": { description: search_failed }

  /v1/parse:
    post:
      summary: Parse one or more URLs in parallel (skips search).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ParseRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:   { type: integer }
                  results: { type: array, items: { $ref: "#/components/schemas/SearchResult" } }
        "400": { description: urls_required }
        "401": { description: missing_or_invalid_api_key }
        "403": { description: admin_only_flag_used_with_non_admin_key }
        "429": { description: rate_limited }

  /v1/summarize:
    post:
      summary: Summarize a single URL using an LLM provider (OpenAI- or Anthropic-compatible).
      description: |
        Parses the URL through the normal extraction pipeline, then asks
        the configured LLM to summarize the extracted text. The source
        page is wrapped in `<page>…</page>` delimiters and the model is
        instructed to treat it as untrusted. Raw reasoning/thinking text
        is never returned — only token counts.

        Non-admin callers may only override provider, model, or thinking
        when the corresponding server config gate allows it. max_tokens,
        timeout_ms, instructions length, and thinking.budget_tokens caps
        apply to all callers, including admins.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:          { type: string, format: uri }
                format:       { type: string, enum: [markdown, plain, bullets], default: markdown }
                instructions: { type: string }
                provider:     { type: string, description: "Provider name (not kind). Defaults to the configured default." }
                model:        { type: string }
                max_tokens:   { type: integer }
                temperature:  { type: number }
                timeout_ms:   { type: integer }
                render:       { type: boolean }
                thinking:
                  type: object
                  properties:
                    enabled:       { type: boolean }
                    budget_tokens: { type: integer, description: "Anthropic only, >= 1024 when set" }
                    effort:        { type: string, enum: [low, medium, high], description: "OpenAI reasoning_effort" }
      responses:
        "200":
          description: summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:  { type: string }
                  provider: { type: string }
                  model:    { type: string }
                  url:      { type: string }
                  title:    { type: string }
                  usage:
                    type: object
                    properties:
                      prompt_tokens:     { type: integer }
                      completion_tokens: { type: integer }
                      reasoning_tokens:  { type: integer }
                      total_tokens:      { type: integer }
        "400": { description: bad_request }
        "401": { description: missing_or_invalid_api_key }
        "422": { description: unsupported_or_empty_content }
        "429": { description: provider_rate_limited }
        "502": { description: provider_auth_or_upstream_error }
        "503": { description: summarize_not_configured }
        "504": { description: provider_timeout }

  /admin/summarize/config:
    get:
      summary: (admin) Snapshot of configured providers. API keys are never returned.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  default:   { type: string }
                  providers: { type: array, items: { type: object } }
        "401": { description: missing_or_invalid_admin_key }

  /admin/summarize/providers:
    put:
      summary: (admin) Upsert a single provider. Omitted fields preserve prior values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                kind:        { type: string, enum: [openai, anthropic] }
                base_url:    { type: string }
                api_key:     { type: string, description: "Write-only. Never returned." }
                model:       { type: string }
                timeout_ms:  { type: integer }
                max_tokens:  { type: integer }
                temperature: { type: number }
                thinking:    { type: object }
      responses:
        "200": { description: updated }
        "400": { description: invalid_config }
        "401": { description: missing_or_invalid_admin_key }

  /admin/summarize/providers/{name}:
    delete:
      summary: (admin) Remove a provider by name.
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        "200": { description: deleted }
        "401": { description: missing_or_invalid_admin_key }

  /admin/summarize/default:
    put:
      summary: (admin) Set the default provider by name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "200": { description: ok }
        "400": { description: unknown_provider }
        "401": { description: missing_or_invalid_admin_key }
