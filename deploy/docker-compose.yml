services:
  fetchmark:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: fetchmark:dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      FM_LISTEN_ADDR: ":8080"
      FM_SEARXNG_URL: "http://searxng:8080"
      FM_REDIS_URL: "redis://redis:6379/0"
      FM_API_KEYS: "${FM_API_KEYS:-dev-key}"
      FM_ADMIN_API_KEYS: "${FM_ADMIN_API_KEYS:-dev-admin}"
      FM_DASHBOARD_USER: "${FM_DASHBOARD_USER:-}"
      FM_DASHBOARD_PASSWORD: "${FM_DASHBOARD_PASSWORD:-}"
      FM_RESPECT_ROBOTS: "true"
      FM_LOG_LEVEL: "info"
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_started

  searxng:
    # Pinned for reproducible builds. Refresh on SearXNG release bumps;
    # `latest` is deliberately avoided. See docs/tasks.md for cadence.
    image: searxng/searxng:2026.4.24-a7ac696b4
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: "http://localhost:8080/"
    volumes:
      - ./searxng:/etc/searxng:rw
    expose:
      - "8080"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis-data:
