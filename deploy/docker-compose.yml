services:
  fetchmark:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: fetchmark:dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      FM_LISTEN_ADDR: ":8080"
      FM_SEARXNG_URL: "http://searxng:8080"
      FM_REDIS_URL: "redis://redis:6379/0"
      FM_API_KEYS: "${FM_API_KEYS:?set FM_API_KEYS}"
      FM_ADMIN_API_KEYS: "${FM_ADMIN_API_KEYS:-}"
      FM_DASHBOARD_USER: "${FM_DASHBOARD_USER:-}"
      FM_DASHBOARD_PASSWORD: "${FM_DASHBOARD_PASSWORD:-}"
      FM_RESPECT_ROBOTS: "true"
      FM_LOG_LEVEL: "info"
      # Renderer is opt-in. Point FM_RENDERER_URL at the chromium
      # service below (enabled via the `render` profile) or leave
      # unset to disable. FM_RENDERER_AUTO turns on automatic retry
      # whenever the extractor flags a page as js_required.
      FM_RENDERER_URL: "${FM_RENDERER_URL:-}"
      FM_RENDERER_AUTO: "${FM_RENDERER_AUTO:-false}"
      FM_RENDERER_TIMEOUT: "${FM_RENDERER_TIMEOUT:-20s}"
      FM_RENDERER_TOKEN: "${FM_RENDERER_TOKEN:-}"

      # Summarize. When any *_MODEL is set the endpoint activates.
      # API keys are only read from env here; the admin API can
      # overlay non-secret fields at runtime (in-process only).
      FM_SUMMARIZE_DEFAULT_PROVIDER: "${FM_SUMMARIZE_DEFAULT_PROVIDER:-}"
      FM_SUMMARIZE_OPENAI_BASE_URL: "${FM_SUMMARIZE_OPENAI_BASE_URL:-}"
      FM_SUMMARIZE_OPENAI_API_KEY: "${FM_SUMMARIZE_OPENAI_API_KEY:-}"
      FM_SUMMARIZE_OPENAI_MODEL: "${FM_SUMMARIZE_OPENAI_MODEL:-}"
      FM_SUMMARIZE_OPENAI_MAX_TOKENS: "${FM_SUMMARIZE_OPENAI_MAX_TOKENS:-}"
      FM_SUMMARIZE_OPENAI_TIMEOUT: "${FM_SUMMARIZE_OPENAI_TIMEOUT:-}"
      FM_SUMMARIZE_OPENAI_THINKING: "${FM_SUMMARIZE_OPENAI_THINKING:-}"
      FM_SUMMARIZE_OPENAI_THINK_EFFORT: "${FM_SUMMARIZE_OPENAI_THINK_EFFORT:-}"
      FM_SUMMARIZE_ANTHROPIC_BASE_URL: "${FM_SUMMARIZE_ANTHROPIC_BASE_URL:-}"
      FM_SUMMARIZE_ANTHROPIC_API_KEY: "${FM_SUMMARIZE_ANTHROPIC_API_KEY:-}"
      FM_SUMMARIZE_ANTHROPIC_MODEL: "${FM_SUMMARIZE_ANTHROPIC_MODEL:-}"
      FM_SUMMARIZE_ANTHROPIC_MAX_TOKENS: "${FM_SUMMARIZE_ANTHROPIC_MAX_TOKENS:-}"
      FM_SUMMARIZE_ANTHROPIC_TIMEOUT: "${FM_SUMMARIZE_ANTHROPIC_TIMEOUT:-}"
      FM_SUMMARIZE_ANTHROPIC_THINKING: "${FM_SUMMARIZE_ANTHROPIC_THINKING:-}"
      FM_SUMMARIZE_ANTHROPIC_THINK_BUDGET: "${FM_SUMMARIZE_ANTHROPIC_THINK_BUDGET:-}"
    extra_hosts:
      # Lets FM_SUMMARIZE_*_BASE_URL point at SubSandwich on the host.
      # On Linux this resolves via Docker's built-in host-gateway alias.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "/fetchmark", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_started

  searxng:
    # Pinned for reproducible builds. Refresh on SearXNG release bumps;
    # `latest` is deliberately avoided. See docs/tasks.md for cadence.
    image: searxng/searxng:2026.4.24-a7ac696b4
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: "http://localhost:8080/"
    volumes:
      - ./searxng:/etc/searxng:rw
    expose:
      - "8080"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Headless renderer for JS-heavy pages. Opt-in via the `render`
  # compose profile:
  #     docker compose --profile render up -d
  # and set FM_RENDERER_URL=http://chromium:3000/content on fetchmark.
  # The image is pinned but intentionally documented as movable — bump
  # when upstream ships a security release.
  chromium:
    image: ghcr.io/browserless/chromium:v2.24.3
    profiles: ["render"]
    restart: unless-stopped
    environment:
      CONCURRENT: "4"
      TIMEOUT: "30000"
      # Keep interpolation optional so non-renderer `docker compose config` works;
      # the renderer profile requires this token at container startup.
      TOKEN: "${FM_RENDERER_TOKEN:-}"
    command:
      - /bin/sh
      - -lc
      - ': "$${TOKEN:?set FM_RENDERER_TOKEN when renderer is enabled}" && exec /usr/src/app/start.sh'
    expose:
      - "3000"

volumes:
  redis-data:
